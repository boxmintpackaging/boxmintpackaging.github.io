backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "Products"
    file: "products.json"
    format: "json"
    fields:
      - label: "Products List"
        name: "products"
        widget: "list"
        fields:
          - {label: "Product ID", name: "id", widget: "string"}
          - {label: "Product Name", name: "name", widget: "string"}
          - {label: "Description", name: "desc", widget: "string"}
          - {label: "Product Image", name: "image", widget: "image", required: false}
          - {label: "Category", name: "cat", widget: "select", options: ["retail", "cosmetic", "food", "luxury", "eco", "shipping"]}
          - {label: "Product Code", name: "code", widget: "string"}
          - {label: "Price ($)", name: "price", widget: "number", value_type: "float", step: 0.01}
          - {label: "Old Price ($)", name: "oldPrice", widget: "number", value_type: "float", step: 0.01}
          - {label: "Icon (Font Awesome)", name: "icon", widget: "string", default: "fa-box"}
          - {label: "Color (1-20)", name: "color", widget: "number", min: 1, max: 20, default: 1}
          - {label: "Badge Text (optional)", name: "badge", widget: "string", required: false}
          - {label: "Badge Style", name: "badgeClass", widget: "select", required: false, options: ["", "badge-popular", "badge-trending", "badge-premium", "badge-eco", "badge-new", "badge-hot", "badge-bestseller"]}
